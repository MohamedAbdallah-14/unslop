<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="unslop - make AI output sound like a human wrote it">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1713"/>
      <stop offset="55%" stop-color="#132019"/>
      <stop offset="100%" stop-color="#0A1310"/>
    </linearGradient>
    <linearGradient id="pLogo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9DBDA5"/>
      <stop offset="100%" stop-color="#5E7867"/>
    </linearGradient>
    <linearGradient id="pWord" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#F7FBF8"/>
      <stop offset="100%" stop-color="#A8C5B0"/>
    </linearGradient>
    <filter id="psoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <pattern id="pgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#2A3A30" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#pbg)"/>
  <rect width="1280" height="640" fill="url(#pgrid)"/>
  <circle cx="1150" cy="110" r="260" fill="#7C9885" opacity="0.18" filter="url(#psoft)"/>
  <circle cx="140"  cy="580" r="240" fill="#A8C5B0" opacity="0.10" filter="url(#psoft)"/>

  <!-- Content block, centered -->
  <g transform="translate(120, 170)">
    <!-- Logo tile -->
    <g>
      <rect width="160" height="160" rx="36" fill="url(#pLogo)"/>
      <rect width="160" height="160" rx="36" fill="none" stroke="#B8D4BF" stroke-opacity="0.3" stroke-width="1"/>
      <path d="M34 42h26v36h40V42h26v86H100V96H60v32H34V42z" fill="#F7FBF8"/>
    </g>

    <!-- Wordmark -->
    <text x="204" y="104" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, Roboto, sans-serif" font-size="148" font-weight="800" fill="url(#pWord)" letter-spacing="-4">
      unslop
    </text>

    <!-- Tagline -->
    <text x="204" y="156" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#B8D4BF">
      Make AI output sound like a human wrote it.
    </text>

    <!-- Pills -->
    <g transform="translate(204, 204)" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="15" font-weight="600">
      <g>
        <rect width="210" height="40" rx="20" fill="#1A2A21" stroke="#3A5443" stroke-width="1"/>
        <circle cx="22" cy="20" r="4" fill="#9BD4A9"/>
        <text x="42" y="26" fill="#D6E7DB">100% blind-judge wins</text>
      </g>
      <g transform="translate(222, 0)">
        <rect width="170" height="40" rx="20" fill="#1A2A21" stroke="#3A5443" stroke-width="1"/>
        <circle cx="22" cy="20" r="4" fill="#9BD4A9"/>
        <text x="42" y="26" fill="#D6E7DB">89% AI-ism cut</text>
      </g>
      <g transform="translate(404, 0)">
        <rect width="236" height="40" rx="20" fill="#1A2A21" stroke="#3A5443" stroke-width="1"/>
        <circle cx="22" cy="20" r="4" fill="#9BD4A9"/>
        <text x="42" y="26" fill="#D6E7DB">preserves code &amp; URLs</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(120, 550)" font-family="ui-sans-serif, -apple-system, sans-serif">
    <text x="0" y="0" font-size="16" font-weight="600" fill="#A8C5B0">Claude Code  &#183;  Cursor  &#183;  Windsurf  &#183;  Gemini CLI  &#183;  OpenAI Codex  &#183;  Copilot</text>
    <text x="0" y="28" font-size="14" fill="#6C8374">github.com/MohamedAbdallah-14/unslop  &#183;  MIT license</text>
  </g>
</svg>

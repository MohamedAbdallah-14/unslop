<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 220" role="img" aria-label="Claude Code statusline showing [unslop:BALANCED] badge">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1713"/>
      <stop offset="100%" stop-color="#0A1310"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="220" fill="url(#sbg)"/>
  <text x="540" y="36" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="14" fill="#8FA396" text-anchor="middle">Claude Code statusline after /unslop</text>

  <!-- Editor chrome -->
  <g transform="translate(40, 60)">
    <rect width="1000" height="128" rx="10" fill="#0B1410" stroke="#2A3A30" stroke-width="1"/>
    <!-- title bar -->
    <rect width="1000" height="28" rx="10" fill="#111D17"/>
    <rect y="16" width="1000" height="12" fill="#111D17"/>
    <circle cx="18" cy="14" r="5" fill="#E38B8B" opacity="0.65"/>
    <circle cx="36" cy="14" r="5" fill="#E6C675" opacity="0.65"/>
    <circle cx="54" cy="14" r="5" fill="#9BD4A9" opacity="0.8"/>
    <text x="500" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6C8374" text-anchor="middle">Claude Code  -  resume-draft.md</text>

    <!-- cursor + prompt line -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
      <text x="20" y="60" fill="#6C8374">&gt;</text>
      <text x="36" y="60" fill="#D6E7DB">Rewrite the opener so it sounds less like every other cover letter.</text>
      <text x="20" y="82" fill="#8FA396" opacity="0.7">Claude is typing&#8230;</text>
    </g>

    <!-- bottom statusline bar -->
    <rect x="0" y="104" width="1000" height="24" rx="0" fill="#0F1A14"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">
      <text x="14" y="120" fill="#6C8374">~/resume</text>
      <text x="110" y="120" fill="#6C8374">  main  </text>
      <text x="180" y="120" fill="#6C8374">Claude 4 Sonnet</text>
    </g>
    <!-- unslop badge -->
    <g transform="translate(870, 108)">
      <rect width="118" height="16" rx="8" fill="#1F3D2A" stroke="#3A5443" stroke-width="1"/>
      <circle cx="14" cy="8" r="3" fill="#9BD4A9"/>
      <text x="26" y="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#9BD4A9">[unslop:BALANCED]</text>
    </g>
  </g>
</svg>

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node (hook tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dev dependencies
        run: pip install -e unslop[dev]

      - name: Lint (ruff)
        run: ruff check unslop/scripts benchmarks

      - name: Type check (mypy, strict)
        run: mypy unslop/scripts

      - name: Unit + integration tests
        run: python -m pytest tests/ -v --tb=short

      - name: Repo integrity verifier
        run: python3 tests/verify_repo.py

      - name: Benchmark (offline, strict, default intensity)
        run: python3 benchmarks/run.py --strict

      - name: Benchmark (all intensities, monotonicity gate)
        run: python3 benchmarks/run.py --all-intensities --strict
